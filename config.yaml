# Dostępne opcje:
# "basic"       - podstawowy model SIR
# "quarantine"  - model z kwarantanną
# "shop"        - model ze wspólnym punktem kontaktu

selected_scenario: shop

base:
  WIDTH: 900
  HEIGHT: 600
  FPS: 60

  POPULATION_SIZE: 150
  INITIAL_INFECTED: 5

  PERSON_RADIUS: 5
  SPEED: 2

  INFECTION_RADIUS: 14
  INFECTION_PROBABILITY: 0.20
  RECOVERY_TIME: 600

  RESULTS_DIR: results
  SAVE_GIF: true
  GIF_FRAME_INTERVAL: 5

scenarios:
  basic: {}

  quarantine:
    INFECTION_RADIUS: 14
    INFECTION_PROBABILITY: 0.2
    RECOVERY_TIME: 600
    QUARANTINE_AFTER: 180

  shop:
    INFECTION_RADIUS: 10
    INFECTION_PROBABILITY: 0.08
    RECOVERY_TIME: 400

    SHOP_X: 450
    SHOP_Y: 300
    SHOP_RADIUS: 55

    SHOP_VISITOR_SHARE: 0.4
    SHOP_VISIT_PROBABILITY: 0.001
    SHOP_STAY_TIME: 90
    SHOP_COOLDOWN: 700
    SHOP_CAPACITY: 20

    SHOP_INFECTION_RADIUS: 20
    SHOP_INFECTION_PROBABILITY: 0.30